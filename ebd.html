<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking EBD | Virtudes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #050505;
            --bg-secondary: #0A0A0A;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --accent-red: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.15);
            --border-light: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --glass-bg: linear-gradient(145deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            --transition-smooth: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            
            /* Pódio */
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #92400e;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding-top: 110px;
            padding-bottom: 60px;
            background-image: radial-gradient(circle at 50% 0%, rgba(239, 68, 68, 0.03) 0%, transparent 50%);
        }

        /* --- HEADER --- */
        .m3-header {
            background-color: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            border-bottom: 1px solid var(--border-light);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .brand-logo {
            font-size: 1.4rem; font-weight: 800; letter-spacing: -1px;
            text-decoration: none; color: var(--text-primary);
        }

        #menu-toggle { display: none; }
        .menu-icon-label { cursor: pointer; z-index: 3000; display: flex; flex-direction: column; gap: 6px; }
        .line { width: 24px; height: 2px; background-color: var(--text-primary); transition: var(--transition-smooth); border-radius: 2px; }
        
        #menu-toggle:checked ~ .menu-icon-label .line:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        #menu-toggle:checked ~ .menu-icon-label .line:nth-child(2) { opacity: 0; }
        #menu-toggle:checked ~ .menu-icon-label .line:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .main-menu {
            position: fixed; top: 0; right: -100%; width: 75%; max-width: 350px; height: 100vh;
            background: #000; display: flex; flex-direction: column; padding: 140px 40px; gap: 35px;
            transition: var(--transition-smooth); border-left: 1px solid var(--border-light); z-index: 2000;
        }
        #menu-toggle:checked ~ .main-menu { right: 0; }
        .main-menu a { color: var(--text-secondary); text-decoration: none; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .main-menu a:hover { color: var(--accent-red); transform: translateX(5px); }
        
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); opacity: 0; visibility: hidden; transition: var(--transition-smooth); z-index: 1500; }
        #menu-toggle:checked ~ .menu-overlay { opacity: 1; visibility: visible; }

        /* --- RANKING CONTAINER --- */
        .container {
            width: 90%;
            max-width: 550px;
            margin: 0 auto;
        }

        .header-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-title h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(to right, #fff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .header-title p {
            font-size: 0.75rem;
            color: var(--accent-red);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 12px;
        }

        /* --- CARDS --- */
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 22px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-smooth);
            cursor: pointer;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.05);
        }

        .rank-info { display: flex; align-items: center; gap: 20px; }
        
        .pos {
            font-weight: 800;
            font-size: 1rem;
            color: var(--text-secondary);
            min-width: 40px;
            font-style: italic;
        }

        .name {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .points {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
        }

        /* Estilos do Pódio */
        .rank-0 { border-color: rgba(251, 191, 36, 0.3); background: linear-gradient(145deg, rgba(251, 191, 36, 0.08), transparent); }
        .rank-0 .pos, .rank-0 .points { color: var(--gold); border-color: rgba(251, 191, 36, 0.2); }
        
        .rank-1 { border-color: rgba(148, 163, 184, 0.3); background: linear-gradient(145deg, rgba(148, 163, 184, 0.08), transparent); }
        .rank-1 .pos, .rank-1 .points { color: var(--silver); border-color: rgba(148, 163, 184, 0.2); }
        
        .rank-2 { border-color: rgba(146, 64, 14, 0.3); background: linear-gradient(145deg, rgba(146, 64, 14, 0.08), transparent); }
        .rank-2 .pos, .rank-2 .points { color: var(--bronze); border-color: rgba(146, 64, 14, 0.2); }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px); display: none; justify-content: center;
            align-items: center; z-index: 5000;
        }
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--bg-secondary); border: 1px solid var(--border-light);
            width: 90%; max-width: 400px; border-radius: 28px;
            padding: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
            animation: modalPop 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .btn-q { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); 
            color: white; padding: 15px 5px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-q:hover { background: var(--accent-red); border-color: var(--accent-red); }

        input {
            width: 100%; padding: 18px; border-radius: 14px; background: #000;
            border: 1px solid var(--border-light); color: white; text-align: center; font-size: 1.2rem; outline: none;
        }
        input:focus { border-color: var(--accent-red); }

        .modal-actions { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 25px; }
        .btn-save { background: var(--accent-red); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; }
        .btn-cancel { background: transparent; color: var(--text-secondary); border: none; padding: 10px; cursor: pointer; font-size: 0.8rem; text-decoration: underline; }

        .admin-status {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--accent-red); font-size: 10px; padding: 8px 20px;
            border-radius: 30px; text-transform: uppercase; font-weight: 800;
            display: none; z-index: 900; box-shadow: 0 0 15px var(--accent-glow);
        }
    </style>
</head>
<body>
    <header class="m3-header">
        <input type="checkbox" id="menu-toggle">
        <a href="index.html" class="brand-logo">Virtudes</a>
        <label for="menu-toggle" class="menu-icon-label">
            <div class="line"></div><div class="line"></div><div class="line"></div>
        </label>
        <label for="menu-toggle" class="menu-overlay"></label>
        <nav class="main-menu">
            <a href="index.html">Início</a>
            <a href="ebd.html" style="color: var(--accent-red);">Ranking da EBD</a>
            <a href="programacao.html">Programação</a>
        </nav>
    </header>

    <div class="container">
        <div class="header-title">
            <p>Escola Bíblica Dominical</p>
            <h1 id="titulo">RANKING GERAL</h1>
        </div>
        <div id="ranking" class="ranking-list">
            </div>
    </div>

    <div id="admin-indicator" class="admin-status">Modo Admin Ativo</div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-nome" style="text-align: center; margin-bottom: 5px;">Nome do Aluno</h3>
            <p style="text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 25px;">Adicionar Pontuação</p>
            
            <input type="number" id="valorCustom" placeholder="00">

            <div class="quick-grid">
                <button class="btn-q" onclick="setValor(5)">+5</button>
                <button class="btn-q" onclick="setValor(10)">+10</button>
                <button class="btn-q" onclick="setValor(20)">+20</button>
                <button class="btn-q" onclick="setValor(50)">+50</button>
            </div>

            <div class="modal-actions">
                <button class="btn-save" onclick="confirmarPontos()">Salvar Pontos</button>
                <button class="btn-cancel" onclick="fecharModal()">Voltar</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAeHHx4PPbBayDIicW-ZVRqnf9OqAlUbBw",
        authDomain: "ranking-jovens-d17d6.firebaseapp.com",
        projectId: "ranking-jovens-d17d6",
        storageBucket: "ranking-jovens-d17d6.firebasestorage.app",
        messagingSenderId: "523093300634",
        appId: "1:523093300634:web:9fbfad3cb992e109a9d623"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const SENHA_ADMIN = "admin";
    let modoAdmin = false;
    let participanteAtual = null;
    let transacoes = [];

    const participantes = [
        {id:1,nome:'Ester'},{id:2,nome:'Isabelle'},{id:3,nome:'Flavia'},
        {id:4,nome:'Julia'},{id:5,nome:'Geovana'},{id:6,nome:'João'},
        {id:7,nome:'Pedro'},{id:8,nome:'Moises'},{id:9,nome:'Miguel'},
        {id:10,nome:'Mariana'},{id:11,nome:'Mateus'},{id:12,nome:'Davi'},
        {id:13,nome:'Guilherme'}
    ];

    const rankingDiv = document.getElementById("ranking");
    const titulo = document.getElementById("titulo");
    const indicator = document.getElementById("admin-indicator");

    titulo.addEventListener("click", () => {
        if(modoAdmin) {
            modoAdmin = false;
            indicator.style.display = "none";
            return;
        }
        const senha = prompt("Senha Admin:");
        if(senha === SENHA_ADMIN) {
            modoAdmin = true;
            indicator.style.display = "block";
        }
    });

    function render() {
        const ranking = participantes.map(p => {
            const soma = transacoes.filter(t => t.participante_id == p.id).reduce((a, b) => a + b.valor, 0);
            return {...p, pontos: soma};
        }).sort((a, b) => b.pontos - a.pontos);

        rankingDiv.innerHTML = ranking.map((p, i) => `
            <div class="card rank-${i}" style="animation-delay: ${i * 0.05}s" onclick="adicionar(${p.id})">
                <div class="rank-info">
                    <span class="pos">${i + 1}º</span>
                    <span class="name">${p.nome}</span>
                </div>
                <strong class="points">${p.pontos}</strong>
            </div>
        `).join("");
    }

    window.adicionar = function(id) {
        if(!modoAdmin) return;
        participanteAtual = id;
        document.getElementById("modal-nome").innerText = participantes.find(p => p.id == id).nome;
        document.getElementById("modal").classList.add("active");
        document.body.style.overflow = 'hidden';
    }

    window.setValor = (v) => document.getElementById("valorCustom").value = v;
    window.fecharModal = () => {
        document.getElementById("modal").classList.remove("active");
        document.body.style.overflow = 'auto';
    }

    window.confirmarPontos = async function() {
        const valor = parseInt(document.getElementById("valorCustom").value);
        if(!valor) return;
        await addDoc(collection(db, "transacoes"), {
            participante_id: participanteAtual,
            valor: valor,
            data: new Date()
        });
        fecharModal();
    }

    onSnapshot(collection(db, "transacoes"), (snapshot) => {
        transacoes = snapshot.docs.map(doc => doc.data());
        render();
    });
</script>
</body>
</html>
