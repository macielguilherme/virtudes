<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ranking EBD | Virtudes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #050505;
            --bg-secondary: #0A0A0A;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --accent-red: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.15);
            --border-light: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --glass-bg: linear-gradient(145deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            --transition-smooth: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            
            /* Pódio */
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #92400e;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding-top: 110px;
            padding-bottom: 60px;
            background-image: radial-gradient(circle at 50% 0%, rgba(239, 68, 68, 0.03) 0%, transparent 50%);
        }

        /* --- HEADER (MESMO DA PROGRAMAÇÃO) --- */
        .m3-header {
            background-color: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            border-bottom: 1px solid var(--border-light);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .brand-logo {
            font-size: 1.4rem; font-weight: 800; letter-spacing: -1px;
            text-decoration: none; color: var(--text-primary);
            order: 1;
        }

        #menu-toggle { display: none; }
        .menu-icon-label { cursor: pointer; z-index: 3000; display: flex; flex-direction: column; gap: 6px; order: 2; padding: 10px 0; }
        .line { width: 24px; height: 2px; background-color: var(--text-primary); transition: var(--transition-smooth); border-radius: 2px; }
        
        #menu-toggle:checked ~ .menu-icon-label .line:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        #menu-toggle:checked ~ .menu-icon-label .line:nth-child(2) { opacity: 0; }
        #menu-toggle:checked ~ .menu-icon-label .line:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .main-menu {
            position: fixed; top: 0; right: -100%; width: 75%; max-width: 350px; height: 100vh;
            background: #000; display: flex; flex-direction: column; padding: 140px 40px; gap: 35px;
            transition: var(--transition-smooth); border-left: 1px solid var(--border-light); z-index: 2000;
        }
        #menu-toggle:checked ~ .main-menu { right: 0; }
        .main-menu a { color: var(--text-secondary); text-decoration: none; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .main-menu a:hover { color: var(--accent-red); transform: translateX(5px); }
        
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); opacity: 0; visibility: hidden; transition: var(--transition-smooth); z-index: 1500; }
        #menu-toggle:checked ~ .menu-overlay { opacity: 1; visibility: visible; }

        /* --- RANKING CONTAINER --- */
        .container {
            width: 90%;
            max-width: 650px;
            margin: 0 auto;
        }

        .header-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-title h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(to right, #fff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            transition: 0.3s;
        }

        .header-title h1:hover {
            background: linear-gradient(to right, var(--accent-red), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 0.75rem;
            color: var(--accent-red);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 12px;
        }

        /* --- ANIMAÇÃO DE ENTRADA --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- RANKING LISTA (ESTILO DOS CARDS IGUAL À PROGRAMAÇÃO) --- */
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-smooth);
            cursor: default;
            opacity: 0;
            animation: fadeInUp 0.7s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        .card.admin-clickable {
            cursor: pointer;
        }

        .card.admin-clickable:hover {
            background: linear-gradient(145deg, rgba(239, 68, 68, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            border-color: var(--accent-red);
            transform: translateY(-4px);
            box-shadow: 0 15px 35px -10px rgba(239,68,68,0.3);
        }

        .card.rank-0 { 
            border-color: rgba(251, 191, 36, 0.4); 
            background: rgba(251, 191, 36, 0.05); 
        }
        .card.rank-0:hover { border-color: var(--gold); box-shadow: 0 15px 35px -10px rgba(251, 191, 36, 0.2); }
        
        .card.rank-1 { 
            border-color: rgba(148, 163, 184, 0.4); 
            background: rgba(148, 163, 184, 0.05); 
        }
        .card.rank-1:hover { border-color: var(--silver); box-shadow: 0 15px 35px -10px rgba(148, 163, 184, 0.2); }
        
        .card.rank-2 { 
            border-color: rgba(146, 64, 14, 0.4); 
            background: rgba(146, 64, 14, 0.05); 
        }
        .card.rank-2:hover { border-color: var(--bronze); box-shadow: 0 15px 35px -10px rgba(146, 64, 14, 0.2); }

        .rank-info { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }

        .pos { 
            font-weight: 800; 
            font-size: 1rem; 
            color: var(--text-secondary); 
            min-width: 35px; 
        }

        .card.rank-0 .pos { color: var(--gold); }
        .card.rank-1 .pos { color: var(--silver); }
        .card.rank-2 .pos { color: var(--bronze); }

        .name { 
            font-weight: 600; 
            font-size: 1.1rem; 
            letter-spacing: -0.01em; 
        }

        .points { 
            font-weight: 800; 
            font-size: 1.3rem; 
            color: var(--text-primary); 
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-light);
        }

        /* --- MODAIS (PONTOS E ADMIN) --- */
        .modal {
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex; 
            justify-content: center;
            align-items: center; 
            z-index: 5000; 
            transition: opacity 0.3s ease;
        }
        
        .modal.hidden { 
            opacity: 0; 
            pointer-events: none; 
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            width: 90%; 
            max-width: 450px; 
            border-radius: 32px;
            padding: 40px 30px; 
            transform: scale(1); 
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .modal.hidden .modal-content { 
            transform: scale(0.9); 
        }

        .modal-content h3 { 
            text-align: center; 
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px; 
            background: linear-gradient(to right, #fff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-content input {
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-light); 
            color: white; 
            text-align: center; 
            font-size: 1.2rem; 
            font-weight: 500;
            outline: none; 
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .modal-content input:focus {
            border-color: var(--accent-red);
            background: rgba(239, 68, 68, 0.05);
        }

        .modal-content input[type="password"] {
            font-family: monospace;
            letter-spacing: 2px;
        }

        .error-message {
            color: var(--accent-red);
            font-size: 0.85rem;
            text-align: center;
            margin: 10px 0;
            min-height: 20px;
        }

        .modal-actions { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 25px; 
        }
        
        .btn-primary { 
            background: white; 
            color: black; 
            border: none; 
            padding: 16px; 
            border-radius: 16px; 
            font-weight: 700; 
            font-size: 1rem;
            cursor: pointer; 
            transition: var(--transition-smooth);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(255,255,255,0.3);
        }
        
        .btn-secondary { 
            background: transparent; 
            color: white; 
            border: 1px solid var(--border-light); 
            padding: 16px; 
            border-radius: 16px; 
            font-weight: 600;
            cursor: pointer; 
            transition: var(--transition-smooth);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--text-secondary);
        }

        /* --- MODAL DE PONTOS (AJUSTADO) --- */
        .modal-pontos .modal-content {
            max-width: 500px;
        }

        .quick-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
            margin: 30px 0; 
        }
        
        .btn-q { 
            background: var(--glass-bg); 
            border: 1px solid var(--border-light); 
            color: white; 
            padding: 18px 5px; 
            border-radius: 16px; 
            font-weight: 700; 
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        
        .btn-q:hover { 
            background: rgba(255,255,255,0.1);
            border-color: var(--accent-red);
            transform: translateY(-2px);
        }

        .admin-status {
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%);
            background: var(--accent-red); 
            font-size: 10px; 
            padding: 8px 20px;
            border-radius: 30px; 
            text-transform: uppercase; 
            font-weight: 800;
            letter-spacing: 1px;
            display: none; 
            z-index: 900;
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 600px) {
            .card {
                padding: 16px 20px;
                border-radius: 20px;
            }
            
            .name { font-size: 1rem; }
            .points { font-size: 1.1rem; padding: 6px 12px; }
            .pos { min-width: 30px; }
            
            .quick-grid { gap: 8px; }
            .btn-q { padding: 15px 5px; font-size: 1rem; }
            
            .modal-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
<header class="m3-header">
    <input type="checkbox" id="menu-toggle">
    <a href="index.html" class="brand-logo">Virtudes</a>
    <label for="menu-toggle" class="menu-icon-label">
        <div class="line"></div><div class="line"></div><div class="line"></div>
    </label>
    <label for="menu-toggle" class="menu-overlay"></label>
    <nav class="main-menu">
        <a href="index.html">Início</a>
        <a href="ebd.html" style="color: var(--accent-red);">Ranking da EBD</a>
        <a href="programacao.html">Programação</a>
    </nav>
</header>

<div class="container">
    <div class="header-title">
        <p>Escola Bíblica Dominical</p>
        <h1 id="titulo">RANKING GERAL</h1>
    </div>
    <div id="ranking" class="ranking-list"></div>
</div>

<div id="admin-indicator" class="admin-status">Modo Admin Ativo</div>

<!-- Modal de Autenticação Admin (criação/login) -->
<div id="modal-auth" class="modal hidden">
    <div class="modal-content">
        <h3 id="auth-title">🔐 Acesso Admin</h3>
        <input type="password" id="senha1" placeholder="Digite sua senha">
        <input type="password" id="senha2" placeholder="Confirme a senha" style="display: none;">
        <div id="auth-error" class="error-message"></div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="fecharModalAuth()">Cancelar</button>
            <button class="btn-primary" onclick="processarAuth()">Continuar</button>
        </div>
    </div>
</div>

<!-- Modal de Adicionar Pontos -->
<div id="modal-pontos" class="modal modal-pontos hidden">
    <div class="modal-content">
        <h3 id="modal-nome">Nome do Aluno</h3>
        <p>Adicionar Pontuação</p>
        <input type="number" id="valorCustom" placeholder="00">
        <div class="quick-grid">
            <button class="btn-q" onclick="setValor(5)">+5</button>
            <button class="btn-q" onclick="setValor(10)">+10</button>
            <button class="btn-q" onclick="setValor(20)">+20</button>
            <button class="btn-q" onclick="setValor(50)">+50</button>
        </div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="fecharModalPontos()">Voltar</button>
            <button class="btn-primary" onclick="confirmarPontos()">Salvar Pontos</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Configuração do Firebase
const firebaseConfig = {
    apiKey: "AIzaSyAeHHx4PPbBayDIicW-ZVRqnf9OqAlUbBw",
    authDomain: "ranking-jovens-d17d6.firebaseapp.com",
    projectId: "ranking-jovens-d17d6",
    storageBucket: "ranking-jovens-d17d6.firebasestorage.app",
    messagingSenderId: "523093300634",
    appId: "1:523093300634:web:9fbfad3cb992e109a9d623"
};

// Inicializar Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Estado da aplicação
let modoAdmin = false;
let participanteAtual = null;
let transacoes = [];
let isFirstAccess = false; // Flag para saber se é primeiro acesso

// Lista de participantes (13 alunos)
const participantes = [
    {id: 1, nome: 'Ester'},
    {id: 2, nome: 'Isabelle'},
    {id: 3, nome: 'Flavia'},
    {id: 4, nome: 'Julia'},
    {id: 5, nome: 'Geovana'},
    {id: 6, nome: 'João'},
    {id: 7, nome: 'Pedro'},
    {id: 8, nome: 'Moises'},
    {id: 9, nome: 'Miguel'},
    {id: 10, nome: 'Mariana'},
    {id: 11, nome: 'Mateus'},
    {id: 12, nome: 'Davi'},
    {id: 13, nome: 'Guilherme'}
];

// Elementos DOM
const rankingDiv = document.getElementById("ranking");
const titulo = document.getElementById("titulo");
const indicator = document.getElementById("admin-indicator");
const checkbox = document.getElementById('menu-toggle');
const modalAuth = document.getElementById('modal-auth');
const modalPontos = document.getElementById('modal-pontos');
const authTitle = document.getElementById('auth-title');
const senha1 = document.getElementById('senha1');
const senha2 = document.getElementById('senha2');
const authError = document.getElementById('auth-error');

// Travar rolagem do body quando o menu lateral estiver aberto
checkbox.addEventListener('change', function() {
    document.body.style.overflow = this.checked ? 'hidden' : 'auto';
});

// Função para criar hash SHA-256 da senha
async function hashSenha(senha) {
    const encoder = new TextEncoder();
    const data = encoder.encode(senha);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// Função para verificar se já existe senha configurada
async function verificarConfigAdmin() {
    const docRef = doc(db, "config", "admin");
    const docSnap = await getDoc(docRef);
    
    return docSnap.exists() && docSnap.data().senha_hash;
}

// Função para abrir modal de autenticação
window.abrirModalAuth = async function() {
    // Verificar se já existe senha configurada
    const existeSenha = await verificarConfigAdmin();
    
    isFirstAccess = !existeSenha;
    
    if (isFirstAccess) {
        // Primeiro acesso: mostrar campos para criar senha
        authTitle.innerText = "🔐 Criar Senha Admin";
        senha2.style.display = "block";
        senha1.placeholder = "Nova senha";
        senha2.placeholder = "Confirme a senha";
    } else {
        // Login: apenas um campo
        authTitle.innerText = "🔐 Login Admin";
        senha2.style.display = "none";
        senha1.placeholder = "Digite sua senha";
    }
    
    // Limpar campos
    senha1.value = '';
    senha2.value = '';
    authError.innerText = '';
    
    modalAuth.classList.remove("hidden");
    document.body.style.overflow = 'hidden';
}

window.fecharModalAuth = function() {
    modalAuth.classList.add("hidden");
    document.body.style.overflow = 'auto';
}

// Processar autenticação (criação ou login)
window.processarAuth = async function() {
    const senha = senha1.value.trim();
    
    if (!senha) {
        authError.innerText = "Digite uma senha!";
        return;
    }
    
    if (isFirstAccess) {
        // Primeiro acesso: criar nova senha
        const confirmacao = senha2.value.trim();
        
        if (senha !== confirmacao) {
            authError.innerText = "As senhas não coincidem!";
            return;
        }
        
        if (senha.length < 6) {
            authError.innerText = "A senha deve ter no mínimo 6 caracteres";
            return;
        }
        
        try {
            // Salvar hash da senha no Firestore
            const hash = await hashSenha(senha);
            await setDoc(doc(db, "config", "admin"), { senha_hash: hash });
            
            // Ativar modo admin
            modoAdmin = true;
            indicator.style.display = "block";
            fecharModalAuth();
            render();
            
            alert("✅ Senha criada com sucesso! Guarde-a em local seguro.");
        } catch (error) {
            console.error("Erro ao criar senha:", error);
            authError.innerText = "Erro ao criar senha. Tente novamente.";
        }
    } else {
        // Login: verificar senha
        try {
            const docSnap = await getDoc(doc(db, "config", "admin"));
            const hashArmazenado = docSnap.data().senha_hash;
            const hashDigitado = await hashSenha(senha);
            
            if (hashDigitado === hashArmazenado) {
                modoAdmin = true;
                indicator.style.display = "block";
                fecharModalAuth();
                render();
            } else {
                authError.innerText = "Senha incorreta!";
            }
        } catch (error) {
            console.error("Erro no login:", error);
            authError.innerText = "Erro ao verificar senha.";
        }
    }
}

// Event listener para ativar modo admin (clique no título)
titulo.addEventListener("click", () => {
    abrirModalAuth();
});

// Funções do modal de pontos
window.adicionar = function(id) {
    if (!modoAdmin) return;
    
    participanteAtual = id;
    const participante = participantes.find(p => p.id == id);
    document.getElementById("modal-nome").innerText = participante.nome;
    document.getElementById("valorCustom").value = '';
    modalPontos.classList.remove("hidden");
    document.body.style.overflow = 'hidden';
}

window.setValor = (v) => {
    document.getElementById("valorCustom").value = v;
}

window.fecharModalPontos = () => {
    modalPontos.classList.add("hidden");
    document.body.style.overflow = 'auto';
}

window.confirmarPontos = async function() {
    const valor = parseInt(document.getElementById("valorCustom").value);
    
    if (!valor || valor <= 0) {
        alert("Digite um valor válido!");
        return;
    }
    
    try {
        await addDoc(collection(db, "transacoes"), {
            participante_id: participanteAtual,
            valor: valor,
            data: new Date().toISOString()
        });
        
        fecharModalPontos();
    } catch (error) {
        console.error("Erro ao salvar:", error);
        alert("Erro ao salvar pontos. Tente novamente.");
    }
}

// Função para renderizar ranking
function render() {
    // Calcular pontos por participante
    const ranking = participantes.map(p => {
        const soma = transacoes
            .filter(t => t.participante_id === p.id)
            .reduce((acc, t) => acc + t.valor, 0);
        return { ...p, pontos: soma };
    }).sort((a, b) => b.pontos - a.pontos);

    // Gerar HTML
    rankingDiv.innerHTML = ranking.map((p, i) => `
        <div class="card rank-${i} ${modoAdmin ? 'admin-clickable' : ''}" 
             onclick="${modoAdmin ? `adicionar(${p.id})` : ''}"
             style="animation-delay: ${0.1 + i * 0.05}s">
            <div class="rank-info">
                <span class="pos">${i + 1}º</span>
                <span class="name">${p.nome}</span>
            </div>
            <strong class="points">${p.pontos}</strong>
        </div>
    `).join("");
}

// Listener em tempo real do Firestore
onSnapshot(collection(db, "transacoes"), (snapshot) => {
    transacoes = snapshot.docs.map(doc => doc.data());
    render();
}, (error) => {
    console.error("Erro no listener:", error);
    rankingDiv.innerHTML = '<div style="text-align: center; color: var(--accent-red); padding: 40px;">Erro ao carregar dados. Verifique conexão.</div>';
});

// Render inicial
render();
</script>
</body>
</html>
