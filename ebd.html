<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking EBD | Virtudes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #141414;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --accent-red: #ef4444;
            --border-light: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --transition-smooth: all 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            
            /* Pódio */
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #92400e;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding-top: 100px;
        }

        /* --- HEADER (IGUAL AO CONVITE) --- */
        .m3-header {
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            border-bottom: 1px solid var(--border-light);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .brand-logo {
            font-size: 1.4rem; font-weight: 700; letter-spacing: -1px;
            text-decoration: none; color: var(--text-primary);
        }

        #menu-toggle { display: none; }
        .menu-icon-label { cursor: pointer; z-index: 3000; display: flex; flex-direction: column; gap: 7px; }
        .line { width: 22px; height: 1px; background-color: var(--text-primary); transition: var(--transition-smooth); }
        
        #menu-toggle:checked ~ .menu-icon-label .line:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        #menu-toggle:checked ~ .menu-icon-label .line:nth-child(2) { opacity: 0; }
        #menu-toggle:checked ~ .menu-icon-label .line:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .main-menu {
            position: fixed; top: 0; right: -100%; width: 75%; max-width: 350px; height: 100vh;
            background: #000; display: flex; flex-direction: column; padding: 140px 40px; gap: 35px;
            transition: var(--transition-smooth); border-left: 1px solid var(--border-light); z-index: 2000;
        }
        #menu-toggle:checked ~ .main-menu { right: 0; }
        .main-menu a { color: var(--text-secondary); text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 2.5px; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); opacity: 0; visibility: hidden; transition: var(--transition-smooth); z-index: 1500; }
        #menu-toggle:checked ~ .menu-overlay { opacity: 1; visibility: visible; }

        /* --- RANKING CONTAINER --- */
        .container {
            width: 90%;
            max-width: 500px;
            margin: 0 auto;
        }

        .header-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-title h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header-title p {
            font-size: 0.7rem;
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 8px;
        }

        /* --- CARDS --- */
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover { background: rgba(255,255,255,0.06); }

        .rank-info { display: flex; align-items: center; gap: 15px; }
        
        .pos {
            font-weight: 800;
            font-size: 0.9rem;
            color: var(--text-secondary);
            min-width: 30px;
        }

        .name {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: -0.01em;
        }

        .points {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        /* Estilos do Pódio */
        .rank-0 { border-color: rgba(251, 191, 36, 0.4); background: rgba(251, 191, 36, 0.05); }
        .rank-0 .pos { color: var(--gold); }
        .rank-1 { border-color: rgba(148, 163, 184, 0.4); background: rgba(148, 163, 184, 0.05); }
        .rank-1 .pos { color: var(--silver); }
        .rank-2 { border-color: rgba(146, 64, 14, 0.4); background: rgba(146, 64, 14, 0.05); }
        .rank-2 .pos { color: var(--bronze); }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); display: flex; justify-content: center;
            align-items: flex-end; z-index: 5000; transition: opacity 0.3s ease;
        }
        .hidden { opacity: 0; pointer-events: none; }
        .modal-content {
            background: var(--bg-secondary); border: 1px solid var(--border-light);
            width: 100%; max-width: 500px; border-radius: 32px 32px 0 0;
            padding: 40px 30px; transform: translateY(0); transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .hidden .modal-content { transform: translateY(100%); }

        .quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .btn-q { 
            background: var(--glass-bg); border: 1px solid var(--border-light); 
            color: white; padding: 15px 5px; border-radius: 12px; font-weight: 700; cursor: pointer;
        }
        .btn-q:active { background: var(--accent-red); }

        input {
            width: 100%; padding: 20px; border-radius: 15px; background: black;
            border: 1px solid var(--border-light); color: white; text-align: center; font-size: 1.2rem; outline: none;
        }

        .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn-save { background: white; color: black; border: none; padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; }
        .btn-cancel { background: transparent; color: white; border: 1px solid var(--border-light); padding: 18px; border-radius: 15px; cursor: pointer; }

        .admin-status {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent-red); font-size: 10px; padding: 5px 15px;
            border-radius: 20px; text-transform: uppercase; font-weight: 800;
            display: none; z-index: 900;
        }
    </style>
</head>
<body>

    <header class="m3-header">
        <input type="checkbox" id="menu-toggle">
        <a href="index.html" class="brand-logo">Virtudes</a>
        
        <label for="menu-toggle" class="menu-icon-label">
            <div class="line"></div><div class="line"></div><div class="line"></div>
        </label>
        
        <label for="menu-toggle" class="menu-overlay"></label>
        
        <nav class="main-menu">
            <a href="index.html">Início</a>
            <a href="ebd.html" style="color: var(--accent-red);">Ranking da EBD</a>
            <a href="programacao.html">Programação</a>
        </nav>
    </header>

    <div class="container">
        <div class="header-title">
            <p>Escola Bíblica Dominical</p>
            <h1 id="titulo">RANKING GERAL</h1>
        </div>

        <div id="ranking" class="ranking-list">
            </div>
    </div>

    <div id="admin-indicator" class="admin-status">Modo Admin Ativo</div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-nome" style="text-align: center; margin-bottom: 5px;">Nome do Aluno</h3>
            <p style="text-align: center; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 20px;">Adicionar Pontuação</p>
            
            <input type="number" id="valorCustom" placeholder="00">

            <div class="quick-grid">
                <button class="btn-q" onclick="setValor(5)">+5</button>
                <button class="btn-q" onclick="setValor(10)">+10</button>
                <button class="btn-q" onclick="setValor(20)">+20</button>
                <button class="btn-q" onclick="setValor(50)">+50</button>
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fecharModal()">Voltar</button>
                <button class="btn-save" onclick="confirmarPontos()">Salvar Pontos</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAeHHx4PPbBayDIicW-ZVRqnf9OqAlUbBw",
        authDomain: "ranking-jovens-d17d6.firebaseapp.com",
        projectId: "ranking-jovens-d17d6",
        storageBucket: "ranking-jovens-d17d6.firebasestorage.app",
        messagingSenderId: "523093300634",
        appId: "1:523093300634:web:9fbfad3cb992e109a9d623"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const SENHA_ADMIN = "admin";
    let modoAdmin = false;
    let participanteAtual = null;
    let transacoes = [];

    const participantes = [
        {id:1,nome:'Ester'},{id:2,nome:'Isabelle'},{id:3,nome:'Flavia'},
        {id:4,nome:'Julia'},{id:5,nome:'Geovana'},{id:6,nome:'João'},
        {id:7,nome:'Pedro'},{id:8,nome:'Moises'},{id:9,nome:'Miguel'},
        {id:10,nome:'Mariana'},{id:11,nome:'Mateus'},{id:12,nome:'Davi'},
        {id:13,nome:'Guilherme'}
    ];

    const rankingDiv = document.getElementById("ranking");
    const titulo = document.getElementById("titulo");
    const indicator = document.getElementById("admin-indicator");

    // Ativa Admin
    titulo.addEventListener("click", () => {
        if(modoAdmin) {
            modoAdmin = false;
            indicator.style.display = "none";
            return;
        }
        const senha = prompt("Senha:");
        if(senha === SENHA_ADMIN) {
            modoAdmin = true;
            indicator.style.display = "block";
        }
    });

    function render() {
        const ranking = participantes.map(p => {
            const soma = transacoes.filter(t => t.participante_id == p.id).reduce((a, b) => a + b.valor, 0);
            return {...p, pontos: soma};
        }).sort((a, b) => b.pontos - a.pontos);

        rankingDiv.innerHTML = ranking.map((p, i) => `
            <div class="card rank-${i}" onclick="adicionar(${p.id})">
                <div class="rank-info">
                    <span class="pos">${i + 1}º</span>
                    <span class="name">${p.nome}</span>
                </div>
                <strong class="points">${p.pontos}</strong>
            </div>
        `).join("");
    }

    window.adicionar = function(id) {
        if(!modoAdmin) return;
        participanteAtual = id;
        document.getElementById("modal-nome").innerText = participantes.find(p => p.id == id).nome;
        document.getElementById("modal").classList.remove("hidden");
        document.body.style.overflow = 'hidden';
    }

    window.setValor = (v) => document.getElementById("valorCustom").value = v;
    window.fecharModal = () => {
        document.getElementById("modal").classList.add("hidden");
        document.body.style.overflow = 'auto';
    }

    window.confirmarPontos = async function() {
        const valor = parseInt(document.getElementById("valorCustom").value);
        if(!valor) return;
        await addDoc(collection(db, "transacoes"), {
            participante_id: participanteAtual,
            valor: valor,
            data: new Date()
        });
        fecharModal();
    }

    onSnapshot(collection(db, "transacoes"), (snapshot) => {
        transacoes = snapshot.docs.map(doc => doc.data());
        render();
    });
</script>
</body>
</html>
