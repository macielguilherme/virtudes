<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtudes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
background:linear-gradient(135deg,#008ecc,#d91e26);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
color:#fff
}
.container{width:100%;max-width:500px;display:flex;flex-direction:column;gap:20px}
.glass{
background:rgba(255,255,255,0.15);
border-radius:16px;
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,0.3);
padding:20px
}
.hidden{display:none}
button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:600
}
.btn-green{background:#28a745;color:#fff}
.btn-red{background:#dc3545;color:#fff}
.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin-bottom:8px
}
.rank-1{border:1px solid gold}
.rank-2{border:1px solid silver}
.rank-3{border:1px solid #CD7F32}
</style>
</head>
<body>

<div class="container">

<div class="glass">
<h2>Virtudes - Jovens</h2>
<button id="btn-admin" class="btn-green">Área Admin</button>
<button id="btn-sair" class="btn-red hidden">Sair Admin</button>
</div>

<div id="ranking" class="glass"></div>

<div id="admin-panel" class="glass hidden">
<h3>Lançar Pontos</h3>
<select id="participante"></select>
<input type="number" id="valor" placeholder="Pontos">
<input type="text" id="motivo" placeholder="Motivo">
<button id="btn-add" class="btn-green">Adicionar</button>

<hr style="margin:15px 0">

<h3>Histórico</h3>
<div id="historico"></div>
<button id="btn-reset" class="btn-red">Encerrar Lição</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SENHA_ADMIN = "admin";
let modoAdmin = false;

const participantes = [
{id:1,nome:'Ester'},{id:2,nome:'Isabelle'},
{id:3,nome:'Flavia'},{id:4,nome:'Julia'},
{id:5,nome:'Geovana'},{id:6,nome:'João'},
{id:7,nome:'Pedro'},{id:8,nome:'Moises'},
{id:9,nome:'Miguel'},{id:10,nome:'Mariana'},
{id:11,nome:'Mateus'},{id:12,nome:'Davi'},
{id:13,nome:'Guilherme'}
];

let transacoes = [];

const rankingDiv = document.getElementById("ranking");
const historicoDiv = document.getElementById("historico");
const adminPanel = document.getElementById("admin-panel");

document.getElementById("btn-admin").onclick=()=>{
const senha = prompt("Digite a senha:");
if(senha===SENHA_ADMIN){
modoAdmin=true;
adminPanel.classList.remove("hidden");
document.getElementById("btn-admin").classList.add("hidden");
document.getElementById("btn-sair").classList.remove("hidden");
}else{
alert("Senha incorreta");
}
};

document.getElementById("btn-sair").onclick=()=>{
modoAdmin=false;
adminPanel.classList.add("hidden");
document.getElementById("btn-admin").classList.remove("hidden");
document.getElementById("btn-sair").classList.add("hidden");
};

function renderRanking(){
const ranking=participantes.map(p=>{
const soma=transacoes
.filter(t=>t.participante_id==p.id)
.reduce((a,b)=>a+b.valor,0);
return {...p,pontos:soma};
}).sort((a,b)=>b.pontos-a.pontos);

rankingDiv.innerHTML=ranking.map((p,i)=>{
let cls="";
if(i==0)cls="rank-1";
if(i==1)cls="rank-2";
if(i==2)cls="rank-3";
return `<div class="card ${cls}">
<span>${i+1}º - ${p.nome}</span>
<strong>${p.pontos}</strong>
</div>`;
}).join("");
}

function renderHistorico(){
historicoDiv.innerHTML=transacoes.slice().reverse().map(t=>{
const nome=participantes.find(p=>p.id==t.participante_id).nome;
return `<div class="card">
<span>${nome} +${t.valor}</span>
<button onclick="deletar('${t.id}')">X</button>
</div>`;
}).join("");
}

window.deletar=async(id)=>{
if(!modoAdmin) return;
await deleteDoc(doc(db,"transacoes",id));
};

document.getElementById("btn-add").onclick=async()=>{
if(!modoAdmin) return;

const id=parseInt(document.getElementById("participante").value);
const valor=parseInt(document.getElementById("valor").value);
const motivo=document.getElementById("motivo").value;

await addDoc(collection(db,"transacoes"),{
participante_id:id,
valor:valor,
motivo:motivo,
data:new Date()
});
};

document.getElementById("btn-reset").onclick=async()=>{
if(!modoAdmin) return;
if(confirm("Tem certeza?")){
const snapshot=await getDocs(collection(db,"transacoes"));
snapshot.forEach(async(d)=>{
await deleteDoc(doc(db,"transacoes",d.id));
});
}
};

onSnapshot(collection(db,"transacoes"),(snapshot)=>{
transacoes=snapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
renderRanking();
renderHistorico();
});

document.getElementById("participante").innerHTML=
participantes.map(p=>`<option value="${p.id}">${p.nome}</option>`).join("");

</script>
</body>
</html>
