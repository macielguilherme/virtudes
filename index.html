<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Virtudes | AD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #141414;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --accent-red: #ef4444;
            --border-light: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        .m3-header {
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            border-bottom: 1px solid var(--border-light);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .nav-container-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .brand-logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -1px;
            text-decoration: none;
            color: var(--text-primary);
        }

        /* --- MENU --- */
        #menu-toggle { display: none; }
        .menu-icon-label { cursor: pointer; z-index: 3000; display: flex; flex-direction: column; gap: 7px; }
        .line { width: 22px; height: 1px; background-color: var(--text-primary); transition: var(--transition-smooth); }
        
        .main-menu {
            position: fixed; top: 0; right: -100%; width: 70%; max-width: 350px; height: 100vh;
            background: #000; display: flex; flex-direction: column; padding: 140px 40px; gap: 35px;
            transition: var(--transition-smooth); border-left: 1px solid var(--border-light); z-index: 2000;
        }
        #menu-toggle:checked ~ .main-menu { right: 0; }
        .main-menu a { color: var(--text-secondary); text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 2.5px; }

        /* --- SEÇÃO LADO A LADO (DESKTOP) --- */
        .informe-container {
            margin-top: 80px;
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 6%;
        }

        .content-wrapper {
            display: flex;
            flex-wrap: wrap; /* Permite quebrar linha no mobile */
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            align-items: center;
        }

        .image-side {
            flex: 1 1 450px; /* Base de 450px, cresce proporcionalmente */
            display: flex;
            justify-content: center;
        }

        .informe-img {
            width: 100%;
            max-width: 550px;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid var(--border-light);
        }

        .details-side {
            flex: 1 1 450px;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            padding: 50px;
            position: relative;
            overflow: hidden;
        }

        /* --- ELEMENTOS DE TEXTO --- */
        .info-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--accent-red);
            margin-bottom: 30px;
            display: block;
        }

        .event-card h1 {
            font-size: clamp(1.8rem, 3vw, 2.8rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin: 30px 0;
            padding: 25px 0;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .meta-item b {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 5px;
            letter-spacing: 0.1em;
        }

        .meta-item p { font-size: 0.95rem; color: var(--text-primary); }

        .watermark {
            font-size: 4rem;
            font-weight: 900;
            color: white;
            opacity: 0.03;
            position: absolute;
            bottom: -10px;
            right: 20px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .bible-quote {
            margin-top: 30px;
        }

        .bible-quote p {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
            font-style: italic;
        }

        .bible-quote span {
            display: block;
            margin-top: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-red);
            font-style: normal;
        }

        /* --- MOBILE --- */
        @media (max-width: 968px) {
            .informe-container { padding: 40px 20px; }
            .content-wrapper { gap: 30px; }
            .details-side { padding: 35px 25px; text-align: center; border-radius: 20px; }
            .meta-grid { grid-template-columns: 1fr; gap: 20px; }
            .watermark { font-size: 2.5rem; }
        }

        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); opacity: 0; visibility: hidden; transition: var(--transition-smooth); z-index: 1500; }
        #menu-toggle:checked ~ .menu-overlay { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <header class="m3-header">
        <input type="checkbox" id="menu-toggle">
        <div class="nav-container-wrapper">
            <a href="#" class="brand-logo">Virtudes</a>
            <label for="menu-toggle" class="menu-icon-label">
                <div class="line"></div><div class="line"></div><div class="line"></div>
            </label>
        </div>
        <label for="menu-toggle" class="menu-overlay"></label>
        <nav class="main-menu">
            <a href="ebd.html">Ranking da EBD</a>
            <a href="#">Programação</a>
            <a href="#">Próximas Aulas</a>
        </nav>
    </header>

    <main class="informe-container">
        <div class="content-wrapper">
            
            <div class="image-side">
                <img src="pizza.jpg" alt="Convite Noite da Pizza" class="informe-img">
            </div>

            <div class="details-side">
                <span class="info-title">Detalhes do Evento</span>
                
                <div class="event-card">
                    <h1>NOITE DA <span style="color: var(--accent-red);">PIZZA</span><br>
                    <span style="font-weight: 300; font-size: 0.6em; color: var(--text-secondary);">Comunhão & Jogos</span></h1>
                    
                    <div class="meta-grid">
                        <div class="meta-item">
                            <b>Data e Horário</b>
                            <p>14 Março — 16:00h</p>
                        </div>
                        <div class="meta-item">
                            <b>Onde será</b>
                            <p>Assembleia de Deus<br><small style="color:var(--text-secondary)">QN 313, Samambaia Sul</small></p>
                        </div>
                    </div>
                </div>

                <div class="bible-quote">
                    <p>"Assim, quer vocês comam, quer bebam... façam tudo para a glória de Deus."</p>
                    <span>1 CORÍNTIOS 10:31</span>
                </div>

                <div class="watermark">Continuamente</div>
            </div>

        </div>
    </main>

    <script>
        const checkbox = document.getElementById('menu-toggle');
        checkbox.addEventListener('change', function() {
            document.body.style.overflow = this.checked ? 'hidden' : 'auto';
        });
    </script>
</body>
</html>
