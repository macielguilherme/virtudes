<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Jovens</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}
.container{
    max-width:700px;
    margin:auto;
}
.card{
    background:#1e1e1e;
    padding:15px;
    margin:10px;
    border-radius:12px;
}
button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.admin{
    background:#00c853;
}
input, select{
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}
</style>
</head>
<body>

<div class="container">
<h1>🏆 Ranking Jovens</h1>

<div id="ranking"></div>

<div id="adminArea" style="display:none;">
<h3>Painel Admin</h3>

<select id="participanteSelect"></select>
<input type="number" id="pontosAdd" placeholder="Adicionar pontos">
<button class="admin" onclick="adicionarPontos()">Adicionar</button>

</div>

<br>
<button onclick="login()">Login Admin</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, updateDoc, onSnapshot, query, orderBy, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAeHHx4PPbBayDIicW-ZVRqnf9OqAlUbBw",
  authDomain: "ranking-jovens-d17d6.firebaseapp.com",
  projectId: "ranking-jovens-d17d6",
  storageBucket: "ranking-jovens-d17d6.firebasestorage.app",
  messagingSenderId: "523093300634",
  appId: "1:523093300634:web:9fbfad3cb992e109a9d623"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = () => {
    signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, (user) => {
    if(user && user.email === "SEU_EMAIL_AQUI"){
        document.getElementById("adminArea").style.display = "block";
    }
});

const rankingDiv = document.getElementById("ranking");
const select = document.getElementById("participanteSelect");

const q = query(collection(db, "participantes"), orderBy("pontos", "desc"));

onSnapshot(q, (snapshot)=>{
    rankingDiv.innerHTML = "";
    select.innerHTML = "";

    snapshot.forEach(docSnap=>{
        const data = docSnap.data();
        const id = docSnap.id;

        rankingDiv.innerHTML += `
        <div class="card">
            <h3>${data.nome}</h3>
            <p>${data.pontos} pontos</p>
        </div>
        `;

        select.innerHTML += `
        <option value="${id}">${data.nome}</option>
        `;
    });
});

window.adicionarPontos = async () => {
    const id = select.value;
    const pontos = parseInt(document.getElementById("pontosAdd").value);

    const ref = doc(db, "participantes", id);

    await updateDoc(ref, {
        pontos: increment(pontos)
    });

    document.getElementById("pontosAdd").value = "";
};

</script>

</body>
</html>
