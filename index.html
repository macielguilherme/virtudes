<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtudes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
background:linear-gradient(135deg,#008ecc,#d91e26);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
color:#fff
}
.container{width:100%;max-width:500px}
.glass{
background:rgba(255,255,255,0.15);
border-radius:16px;
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,0.3);
padding:20px;
margin-bottom:15px
}
.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin-bottom:8px;
cursor:pointer;
transition:0.2s;
}
.card:hover{background:rgba(255,255,255,0.1)}
.rank-1{border:1px solid gold}
.rank-2{border:1px solid silver}
.rank-3{border:1px solid #CD7F32}
.admin-mode{box-shadow:0 0 15px #00ff99}
</style>
</head>
<body>

<div class="container">

<div class="glass">
<h2 id="titulo">Virtudes - Jovens</h2>
<p style="font-size:12px;opacity:0.6">Clique no nome para atualizar (admin)</p>
</div>

<div id="ranking" class="glass"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SENHA = "admin";
let modoAdmin = false;

const participantes = [
{id:1,nome:'Ester'},{id:2,nome:'Isabelle'},
{id:3,nome:'Flavia'},{id:4,nome:'Julia'},
{id:5,nome:'Geovana'},{id:6,nome:'João'},
{id:7,nome:'Pedro'},{id:8,nome:'Moises'},
{id:9,nome:'Miguel'},{id:10,nome:'Mariana'},
{id:11,nome:'Mateus'},{id:12,nome:'Davi'},
{id:13,nome:'Guilherme'}
];

let transacoes = [];

document.getElementById("titulo").onclick=()=>{
const senha = prompt("Senha admin:");
if(senha===SENHA){
modoAdmin=true;
alert("Modo admin ativado");
document.getElementById("ranking").classList.add("admin-mode");
}
};

function render(){
const ranking=participantes.map(p=>{
const soma=transacoes
.filter(t=>t.participante_id==p.id)
.reduce((a,b)=>a+b.valor,0);
return {...p,pontos:soma};
}).sort((a,b)=>b.pontos-a.pontos);

document.getElementById("ranking").innerHTML=ranking.map((p,i)=>{
let cls="";
if(i==0)cls="rank-1";
if(i==1)cls="rank-2";
if(i==2)cls="rank-3";
return `<div class="card ${cls}" onclick="adicionar(${p.id})">
<span>${i+1}º - ${p.nome}</span>
<strong>${p.pontos}</strong>
</div>`;
}).join("");
}

window.adicionar=async(id)=>{
if(!modoAdmin) return;

let pontos = prompt("Quantos pontos adicionar?");
if(!pontos) return;

await addDoc(collection(db,"transacoes"),{
participante_id:id,
valor:parseInt(pontos),
data:new Date()
});
};

onSnapshot(collection(db,"transacoes"),(snapshot)=>{
transacoes=snapshot.docs.map(doc=>doc.data());
render();
});

</script>
</body>
</html>
