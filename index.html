<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtudes - Jovens</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#008ecc,#d91e26);
min-height:100vh;
display:flex;
justify-content:center;
padding:25px;
color:#fff;
}

.container{width:100%;max-width:500px}

.glass{
background:rgba(255,255,255,0.15);
border-radius:18px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
padding:20px;
margin-bottom:20px;
}

#titulo{
text-align:center;
font-size:1.9rem;
font-weight:700;
cursor:pointer;
letter-spacing:1px;
}

.admin-active{
box-shadow:0 0 20px #00ff99;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
margin-bottom:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
background:rgba(255,255,255,0.08);
}

.card:hover{
background:rgba(255,255,255,0.15);
}

.rank-1{border:1px solid gold}
.rank-2{border:1px solid silver}
.rank-3{border:1px solid #CD7F32}

/* ===== MODAL ===== */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
}

.hidden{display:none}

.modal-content{
background:#fff;
color:#333;
padding:25px;
border-radius:16px;
width:90%;
max-width:350px;
text-align:center;
animation:fadeIn .2s ease;
}

@keyframes fadeIn{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

.quick-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin:15px 0;
}

.quick-buttons button{
padding:10px;
border:none;
border-radius:8px;
background:#008ecc;
color:white;
font-weight:bold;
cursor:pointer;
}

.quick-buttons button:hover{
opacity:.8;
}

.modal-content input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
}

.modal-actions{
margin-top:15px;
display:flex;
gap:10px;
}

.modal-actions button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.confirm{background:#28a745;color:white}
.cancel{background:#dc3545;color:white}
</style>
</head>
<body>

<div class="container">

<div class="glass">
<h2 id="titulo">Virtudes - Jovens</h2>
</div>

<div id="ranking" class="glass"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
<div class="modal-content">
<h3 id="modal-nome"></h3>

<div class="quick-buttons">
<button onclick="setValor(5)">+5</button>
<button onclick="setValor(10)">+10</button>
<button onclick="setValor(20)">+20</button>
<button onclick="setValor(50)">+50</button>
</div>

<input type="number" id="valorCustom" placeholder="Outro valor">

<div class="modal-actions">
<button class="confirm" onclick="confirmarPontos()">Confirmar</button>
<button class="cancel" onclick="fecharModal()">Cancelar</button>
</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAeHHx4PPbBayDIicW-ZVRqnf9OqAlUbBw",
  authDomain: "ranking-jovens-d17d6.firebaseapp.com",
  projectId: "ranking-jovens-d17d6",
  storageBucket: "ranking-jovens-d17d6.firebasestorage.app",
  messagingSenderId: "523093300634",
  appId: "1:523093300634:web:9fbfad3cb992e109a9d623"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SENHA_ADMIN = "admin";
let modoAdmin = false;
let tempoPressionado;
let participanteAtual = null;

const participantes = [
{id:1,nome:'Ester'},{id:2,nome:'Isabelle'},
{id:3,nome:'Flavia'},{id:4,nome:'Julia'},
{id:5,nome:'Geovana'},{id:6,nome:'João'},
{id:7,nome:'Pedro'},{id:8,nome:'Moises'},
{id:9,nome:'Miguel'},{id:10,nome:'Mariana'},
{id:11,nome:'Mateus'},{id:12,nome:'Davi'},
{id:13,nome:'Guilherme'}
];

let transacoes = [];

const rankingDiv = document.getElementById("ranking");
const titulo = document.getElementById("titulo");

/* ===== ADMIN ===== */
titulo.addEventListener("click",()=>{
if(modoAdmin) return;
const senha = prompt("Senha admin:");
if(senha===SENHA_ADMIN){
modoAdmin=true;
rankingDiv.classList.add("admin-active");
alert("Modo Admin Ativado");
}
});

titulo.addEventListener("mousedown",()=>{
tempoPressionado=setTimeout(()=>{
modoAdmin=false;
rankingDiv.classList.remove("admin-active");
alert("Modo Admin Desativado");
},2000);
});
titulo.addEventListener("mouseup",()=>clearTimeout(tempoPressionado));

/* ===== RENDER ===== */
function render(){
const ranking=participantes.map(p=>{
const soma=transacoes
.filter(t=>t.participante_id==p.id)
.reduce((a,b)=>a+b.valor,0);
return {...p,pontos:soma};
}).sort((a,b)=>b.pontos-a.pontos);

rankingDiv.innerHTML=ranking.map((p,i)=>{
let cls="";
if(i==0)cls="rank-1";
if(i==1)cls="rank-2";
if(i==2)cls="rank-3";

return `<div class="card ${cls}" onclick="adicionar(${p.id})">
<span>${i+1}º  ${p.nome}</span>
<strong>${p.pontos}</strong>
</div>`;
}).join("");
}

/* ===== MODAL FUNÇÕES ===== */

window.adicionar = function(id){
if(!modoAdmin) return;
participanteAtual=id;
const nome=participantes.find(p=>p.id==id).nome;
document.getElementById("modal-nome").innerText=nome;
document.getElementById("valorCustom").value="";
document.getElementById("modal").classList.remove("hidden");
}

window.setValor = function(valor){
document.getElementById("valorCustom").value=valor;
}

window.fecharModal = function(){
document.getElementById("modal").classList.add("hidden");
}

window.confirmarPontos = async function(){
const valor=parseInt(document.getElementById("valorCustom").value);
if(!valor) return;

await addDoc(collection(db,"transacoes"),{
participante_id:participanteAtual,
valor:valor,
data:new Date()
});

fecharModal();
}

/* ===== FIRESTORE ===== */
onSnapshot(collection(db,"transacoes"),(snapshot)=>{
transacoes=snapshot.docs.map(doc=>doc.data());
render();
});

</script>
</body>
</html>
