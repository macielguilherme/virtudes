<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtudes - Jovens</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#008ecc,#d91e26);
min-height:100vh;
display:flex;
justify-content:center;
padding:25px;
color:#fff;
}

.container{width:100%;max-width:500px}

.glass{
background:rgba(255,255,255,0.15);
border-radius:18px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
padding:20px;
margin-bottom:20px;
}

#titulo{
text-align:center;
font-size:1.9rem;
font-weight:700;
cursor:pointer;
letter-spacing:1px;
}

.admin-active{
box-shadow:0 0 20px #00ff99;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
margin-bottom:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
background:rgba(255,255,255,0.08);
}

.card:hover{
background:rgba(255,255,255,0.15);
}

.rank-1{border:1px solid gold}
.rank-2{border:1px solid silver}
.rank-3{border:1px solid #CD7F32}
</style>
</head>
<body>

<div class="container">

<div class="glass">
<h2 id="titulo">Virtudes - Jovens</h2>
</div>

<div id="ranking" class="glass"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SENHA_ADMIN = "admin";
let modoAdmin = false;
let tempoPressionado;

const participantes = [
{id:1,nome:'Ester'},{id:2,nome:'Isabelle'},
{id:3,nome:'Flavia'},{id:4,nome:'Julia'},
{id:5,nome:'Geovana'},{id:6,nome:'João'},
{id:7,nome:'Pedro'},{id:8,nome:'Moises'},
{id:9,nome:'Miguel'},{id:10,nome:'Mariana'},
{id:11,nome:'Mateus'},{id:12,nome:'Davi'},
{id:13,nome:'Guilherme'}
];

let transacoes = [];

const rankingDiv = document.getElementById("ranking");
const titulo = document.getElementById("titulo");

/* ===== ATIVAR ADMIN ===== */
titulo.addEventListener("click",()=>{
if(modoAdmin) return;
const senha = prompt("Senha admin:");
if(senha===SENHA_ADMIN){
modoAdmin=true;
rankingDiv.classList.add("admin-active");
alert("Modo Admin Ativado");
}
});

/* ===== DESATIVAR ADMIN (segurar 2s) ===== */
titulo.addEventListener("mousedown",()=>{
tempoPressionado=setTimeout(()=>{
modoAdmin=false;
rankingDiv.classList.remove("admin-active");
alert("Modo Admin Desativado");
},2000);
});

titulo.addEventListener("mouseup",()=>clearTimeout(tempoPressionado));

/* ===== RENDER RANKING ===== */
function render(){
const ranking=participantes.map(p=>{
const soma=transacoes
.filter(t=>t.participante_id==p.id)
.reduce((a,b)=>a+b.valor,0);
return {...p,pontos:soma};
}).sort((a,b)=>b.pontos-a.pontos);

rankingDiv.innerHTML=ranking.map((p,i)=>{
let cls="";
if(i==0)cls="rank-1";
if(i==1)cls="rank-2";
if(i==2)cls="rank-3";
return `<div class="card ${cls}" onclick="adicionar(${p.id})">
<span>${i+1}º - ${p.nome}</span>
<strong>${p.pontos}</strong>
</div>`;
}).join("");
}

/* ===== ADICIONAR PONTOS ===== */
window.adicionar=async(id)=>{
if(!modoAdmin) return;

let pontos = prompt("Quantos pontos?");
if(!pontos) return;

await addDoc(collection(db,"transacoes"),{
participante_id:id,
valor:parseInt(pontos),
data:new Date()
});
};

/* ===== FIRESTORE REALTIME ===== */
onSnapshot(collection(db,"transacoes"),(snapshot)=>{
transacoes=snapshot.docs.map(doc=>doc.data());
render();
});

</script>
</body>
</html>
